name: Standard Web Runner

on:
  workflow_dispatch:
    inputs:

      runner:
        description: "Select runner OS"
        required: true
        type: choice
        options:
          - ubuntu-latest
          - ubuntu-24.04
          - ubuntu-22.04
          - windows-latest
          - macos-latest
        default: ubuntu-latest

      duration:
        description: "Keep alive duration (minutes)"
        required: true
        default: "30"
        type: string


jobs:
  runner:

    runs-on: ${{ inputs.runner }}

    steps:

      - name: Checkout
        uses: actions/checkout@v4


      - name: System Info (Fixed Cross-Platform)
        shell: bash
        run: |
          echo "================================"
          echo "Runner Information"
          echo "================================"

          echo "OS: $RUNNER_OS"
          echo ""

          echo "Kernel:"
          uname -a
          echo ""

          echo "Architecture:"
          uname -m
          echo ""

          echo "CPU:"

          if command -v lscpu >/dev/null 2>&1; then
              lscpu | grep -E "Model name|CPU\\(s\\)" || true

          elif [[ "$RUNNER_OS" == "macOS" ]]; then
              sysctl -n machdep.cpu.brand_string || true

          else
              echo "CPU info not available"
          fi

          echo ""

          echo "Memory:"

          if [[ "$RUNNER_OS" == "Linux" ]]; then
              free -h

          elif [[ "$RUNNER_OS" == "macOS" ]]; then
              TOTAL_MEM=$(sysctl -n hw.memsize)
              echo "Total Memory: $((TOTAL_MEM / 1024 / 1024)) MB"

          else
              echo "Memory info not available"
          fi

          echo ""

          echo "Disk:"
          df -h /

          echo ""

          echo "GPU:"
          if command -v nvidia-smi >/dev/null 2>&1; then
              nvidia-smi
          else
              echo "No NVIDIA GPU detected"
          fi


      - name: Start Web Terminal
        shell: bash
        run: |
          case "$RUNNER_OS" in

            Linux)
              bash scripts/linux.sh
              ;;

            macOS)
              bash scripts/macos.sh
              ;;

            Windows)
              pwsh scripts/windows.ps1
              ;;

          esac


      - name: Keep Alive
        shell: bash
        run: |
          MINUTES=${{ inputs.duration }}
          echo "Keep alive: $MINUTES minutes"
          sleep $((MINUTES * 60))
          echo "Finished"