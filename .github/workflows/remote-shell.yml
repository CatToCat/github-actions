name: Standard Runner


on:
  workflow_dispatch:
    inputs:

      runner:
        description: "Select runner OS"
        required: true
        type: choice
        options:
          - ubuntu-latest
          - ubuntu-24.04
          - ubuntu-22.04
          - windows-latest
          - macos-latest
        default: ubuntu-latest


      duration:
        description: "Keep alive duration (minutes)"
        required: true
        default: "30"
        type: string



jobs:

  runner:

    runs-on: ${{ inputs.runner }}


    steps:


      - name: Checkout repository
        uses: actions/checkout@v4



      - name: Show system information
        shell: bash
        run: |

          echo "================================"
          echo "Runner Information"
          echo "================================"

          echo "Runner OS:"
          echo "$RUNNER_OS"


          echo ""
          echo "CPU"

          if command -v lscpu
          then
              lscpu | grep -E \
              "Model name|CPU\(s\)|Architecture"
          else
              sysctl -n machdep.cpu.brand_string || true
          fi



          echo ""
          echo "Memory"

          free -h 2>/dev/null || \
          systeminfo | findstr Memory



          echo ""
          echo "Disk"

          df -h || true



          echo ""
          echo "GPU"

          if command -v nvidia-smi
          then
              nvidia-smi
          else
              echo "No NVIDIA GPU detected"
          fi




      - name: Start Web Terminal
        shell: bash
        run: |

          case "$RUNNER_OS" in

            Linux)

              chmod +x scripts/linux.sh
              ./scripts/linux.sh
              ;;


            macOS)

              chmod +x scripts/macos.sh
              ./scripts/macos.sh
              ;;


            Windows)

              pwsh scripts/windows.ps1
              ;;


          esac




      - name: Keep runner alive
        shell: bash
        run: |

          MINUTES=${{ inputs.duration }}

          echo "Keep alive: $MINUTES minutes"


          sleep $((MINUTES * 60))


          echo "Runner finished"